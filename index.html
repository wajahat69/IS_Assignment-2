<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <title>Text Encryption Tool</title>

     <!-- Responsive -->
     <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <!-- Styling -->
     <style>
          body {
               font-family: Arial, sans-serif;
               background: #f4f6f8;
               padding: 40px;
          }

          .container {
               max-width: 600px;
               margin: auto;
               background: white;
               padding: 25px;
               border-radius: 10px;
               box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
          }

          h2 {
               text-align: center;
          }

          textarea,
          select,
          input,
          button {
               width: 100%;
               margin-top: 10px;
               padding: 10px;
               font-size: 14px;
          }

          button {
               background: #007bff;
               color: white;
               border: none;
               cursor: pointer;
          }

          button:hover {
               background: #0056b3;
          }
     </style>
</head>

<body>

     <div class="container">
          <h2>🔐 Text Encryption Tool</h2>

          <!-- Input -->
          <label>Enter Text:</label>
          <textarea id="inputText" rows="4" placeholder="Enter your text here..."></textarea>

          <!-- Dropdown -->
          <label>Select Encryption:</label>
          <select id="algorithm">
               <option value="">-- Select Method --</option>
               <option value="caesar">Caesar Cipher</option>
               <option value="aes">AES Encryption</option>
               <option value="base64">Base64 Encoding</option>
          </select>

          <!-- Key -->
          <input type="text" id="key" placeholder="Enter key (required for AES)">

          <!-- Button -->
          <button onclick="encryptText()">Encrypt</button>

          <!-- Output -->
          <label>Encrypted Output:</label>
          <textarea id="outputText" rows="4" readonly></textarea>

          <button onclick="copyText()">Copy Output</button>
     </div>

     <!-- CryptoJS Library -->
     <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

     <script>

          // Caesar Cipher Function
          function caesarCipher(text, shift = 3) {
               return text.split('').map(char => {
                    let code = char.charCodeAt(0);

                    if (code >= 65 && code <= 90) {
                         return String.fromCharCode((code - 65 + shift) % 26 + 65);
                    }
                    if (code >= 97 && code <= 122) {
                         return String.fromCharCode((code - 97 + shift) % 26 + 97);
                    }
                    return char;
               }).join('');
          }

          // Main Encryption Function
          function encryptText() {

               let text = document.getElementById("inputText").value;
               let algo = document.getElementById("algorithm").value;
               let key = document.getElementById("key").value;
               let output = "";

               // Validation
               if (text.trim() === "") {
                    alert("Please enter text!");
                    return;
               }

               if (algo === "") {
                    alert("Please select encryption method!");
                    return;
               }

               // Apply encryption
               if (algo === "caesar") {
                    output = caesarCipher(text);
               }
               else if (algo === "aes") {

                    if (key.trim() === "") {
                         alert("Please enter a key for AES!");
                         return;
                    }

                    output = CryptoJS.AES.encrypt(text, key).toString();
               }
               else if (algo === "base64") {
                    output = btoa(text);
               }

               document.getElementById("outputText").value = output;
          }

          // Copy Function
          function copyText() {
               let output = document.getElementById("outputText");

               if (output.value === "") {
                    alert("Nothing to copy!");
                    return;
               }

               output.select();
               document.execCommand("copy");
               alert("Copied to clipboard!");
          }

     </script>

</body>

</html>
